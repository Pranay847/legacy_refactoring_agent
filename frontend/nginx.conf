server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend container. All backend routes are
    # under /api/ (see backend/app.py), so the path is preserved as-is.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Service generation can run for minutes; don't cut it off.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Repo uploads (backend MAX_UPLOAD_PART_SIZE is 50 MB).
        client_max_body_size 60m;
    }

    # SPA fallback — every non-asset route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
